<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Safron Biryani — Authentic Kalaburagi</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;0,700;1,400;1,600&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet" />
<style>
  :root {
    --gold: #C9A84C;
    --saffron: #E8842A;
    --saffron-light: #F4A940;
    --bg: #0A0804;
    --bg2: #100E08;
    --bg3: #161208;
    --glass: rgba(201,168,76,0.05);
    --glass-border: rgba(201,168,76,0.18);
    --text: #F5EDD8;
    --muted: #9A8A68;
    --glow: rgba(232,132,42,0.35);
    --glow2: rgba(201,168,76,0.25);
  }

  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  html { scroll-behavior: smooth; font-size: 16px; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'DM Sans', sans-serif;
    overflow-x: hidden;
    line-height: 1.6;
  }

  /* ─── SCROLLBAR ─── */
  ::-webkit-scrollbar { width: 4px; }
  ::-webkit-scrollbar-track { background: var(--bg); }
  ::-webkit-scrollbar-thumb { background: var(--gold); border-radius: 4px; }

  /* ─── NOISE OVERLAY ─── */
  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.04'/%3E%3C/svg%3E");
    pointer-events: none;
    z-index: 9999;
    opacity: 0.5;
  }

  /* ─── NAVBAR ─── */
  nav {
    position: fixed;
    top: 0; left: 0; right: 0;
    z-index: 100;
    padding: 1rem 2.5rem;
    display: flex;
    align-items: center;
    justify-content: space-between;
    backdrop-filter: blur(20px);
    -webkit-backdrop-filter: blur(20px);
    background: rgba(10,8,4,0.65);
    border-bottom: 1px solid var(--glass-border);
    transition: all 0.3s ease;
  }

  .nav-logo {
    font-family: 'Cormorant Garamond', serif;
    font-size: 1.6rem;
    font-weight: 700;
    color: var(--gold);
    letter-spacing: 0.02em;
    text-decoration: none;
  }

  .nav-logo span { color: var(--saffron); }

  .nav-links {
    display: flex;
    gap: 2.2rem;
    list-style: none;
  }

  .nav-links a {
    text-decoration: none;
    color: var(--muted);
    font-size: 0.82rem;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    font-weight: 500;
    transition: color 0.3s;
  }

  .nav-links a:hover { color: var(--gold); }

  .nav-cta {
    background: linear-gradient(135deg, var(--gold), var(--saffron));
    color: var(--bg) !important;
    padding: 0.45rem 1.2rem;
    border-radius: 2px;
    font-weight: 500 !important;
    transition: box-shadow 0.3s, transform 0.2s !important;
  }

  .nav-cta:hover {
    box-shadow: 0 0 20px var(--glow);
    transform: translateY(-1px);
  }

  /* ─── HERO ─── */
  #hero {
    position: relative;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    text-align: center;
    padding: 8rem 2rem 5rem;
    overflow: hidden;
  }

  .hero-bg {
    position: absolute;
    inset: 0;
    background:
      radial-gradient(ellipse 80% 60% at 50% 40%, rgba(232,132,42,0.12) 0%, transparent 65%),
      radial-gradient(ellipse 60% 50% at 20% 80%, rgba(201,168,76,0.08) 0%, transparent 55%),
      url('https://images.unsplash.com/photo-1589302168068-964664d93dc0?w=1600&q=80') center/cover no-repeat;
    filter: brightness(0.22) saturate(1.4);
    z-index: 0;
  }

  .hero-glow {
    position: absolute;
    width: 600px; height: 600px;
    border-radius: 50%;
    background: radial-gradient(circle, rgba(232,132,42,0.18) 0%, transparent 70%);
    top: 50%; left: 50%;
    transform: translate(-50%,-50%);
    animation: pulse 4s ease-in-out infinite;
    z-index: 1;
  }

  @keyframes pulse {
    0%,100% { transform: translate(-50%,-50%) scale(1); opacity: 0.7; }
    50% { transform: translate(-50%,-50%) scale(1.12); opacity: 1; }
  }

  .hero-content { position: relative; z-index: 2; max-width: 820px; }

  .hero-eyebrow {
    display: inline-flex;
    align-items: center;
    gap: 0.7rem;
    font-size: 0.72rem;
    letter-spacing: 0.25em;
    text-transform: uppercase;
    color: var(--gold);
    margin-bottom: 1.5rem;
    font-weight: 500;
  }

  .hero-eyebrow::before, .hero-eyebrow::after {
    content: '';
    width: 30px; height: 1px;
    background: var(--gold);
    opacity: 0.6;
  }

  h1 {
    font-family: 'Cormorant Garamond', serif;
    font-size: clamp(3.2rem, 7vw, 5.8rem);
    font-weight: 700;
    line-height: 1.08;
    color: var(--text);
    margin-bottom: 1.5rem;
    letter-spacing: -0.01em;
  }

  h1 em {
    font-style: italic;
    background: linear-gradient(135deg, var(--gold), var(--saffron-light));
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
  }

  .hero-sub {
    font-size: 1.05rem;
    color: var(--muted);
    max-width: 500px;
    margin: 0 auto 2.5rem;
    line-height: 1.7;
    font-weight: 300;
  }

  .hero-buttons { display: flex; gap: 1rem; justify-content: center; flex-wrap: wrap; }

  .btn-primary {
    padding: 0.85rem 2rem;
    background: linear-gradient(135deg, var(--gold), var(--saffron));
    color: var(--bg);
    border: none;
    border-radius: 2px;
    font-family: 'DM Sans', sans-serif;
    font-size: 0.82rem;
    font-weight: 500;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    cursor: pointer;
    text-decoration: none;
    transition: box-shadow 0.3s, transform 0.2s;
  }

  .btn-primary:hover {
    box-shadow: 0 0 28px var(--glow), 0 6px 20px rgba(0,0,0,0.4);
    transform: translateY(-2px);
  }

  .btn-ghost {
    padding: 0.85rem 2rem;
    background: transparent;
    color: var(--gold);
    border: 1px solid var(--glass-border);
    border-radius: 2px;
    font-family: 'DM Sans', sans-serif;
    font-size: 0.82rem;
    font-weight: 500;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    cursor: pointer;
    text-decoration: none;
    backdrop-filter: blur(8px);
    transition: all 0.3s;
  }

  .btn-ghost:hover {
    border-color: var(--gold);
    background: rgba(201,168,76,0.08);
    box-shadow: 0 0 18px var(--glow2);
    transform: translateY(-2px);
  }

  .hero-scroll {
    position: absolute;
    bottom: 2rem; left: 50%;
    transform: translateX(-50%);
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 0.5rem;
    color: var(--muted);
    font-size: 0.68rem;
    letter-spacing: 0.15em;
    text-transform: uppercase;
    z-index: 2;
    animation: float 2.5s ease-in-out infinite;
  }

  .hero-scroll::after {
    content: '';
    width: 1px; height: 40px;
    background: linear-gradient(to bottom, var(--gold), transparent);
  }

  @keyframes float {
    0%,100% { transform: translateX(-50%) translateY(0); }
    50% { transform: translateX(-50%) translateY(6px); }
  }

  /* ─── SECTION BASICS ─── */
  section { padding: 6rem 2rem; }

  .container { max-width: 1100px; margin: 0 auto; }

  .section-label {
    font-size: 0.68rem;
    letter-spacing: 0.3em;
    text-transform: uppercase;
    color: var(--saffron);
    font-weight: 500;
    margin-bottom: 0.8rem;
    display: flex;
    align-items: center;
    gap: 0.8rem;
  }

  .section-label::before {
    content: '';
    width: 24px; height: 1px;
    background: var(--saffron);
    opacity: 0.7;
  }

  .section-title {
    font-family: 'Cormorant Garamond', serif;
    font-size: clamp(2.2rem, 4.5vw, 3.4rem);
    font-weight: 700;
    line-height: 1.1;
    margin-bottom: 1rem;
  }

  .section-title em {
    font-style: italic;
    color: var(--gold);
  }

  /* ─── GLASS CARD ─── */
  .glass-card {
    background: var(--glass);
    border: 1px solid var(--glass-border);
    border-radius: 4px;
    backdrop-filter: blur(16px);
    -webkit-backdrop-filter: blur(16px);
    transition: all 0.35s ease;
    position: relative;
    overflow: hidden;
  }

  .glass-card::before {
    content: '';
    position: absolute;
    inset: 0;
    background: linear-gradient(135deg, rgba(201,168,76,0.06) 0%, transparent 60%);
    opacity: 0;
    transition: opacity 0.35s;
  }

  .glass-card:hover::before { opacity: 1; }

  .glass-card:hover {
    border-color: rgba(201,168,76,0.4);
    box-shadow: 0 0 28px rgba(201,168,76,0.12), 0 12px 40px rgba(0,0,0,0.4);
    transform: translateY(-4px);
  }

  /* ─── ABOUT ─── */
  #about { background: var(--bg2); }

  .about-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 4rem;
    align-items: center;
  }

  .about-text p {
    color: var(--muted);
    line-height: 1.85;
    font-weight: 300;
    font-size: 0.98rem;
    margin-bottom: 1.2rem;
  }

  .about-features {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 1rem;
    margin-top: 2rem;
  }

  .about-feat {
    padding: 1.2rem;
    display: flex;
    align-items: flex-start;
    gap: 0.8rem;
  }

  .feat-icon {
    width: 36px; height: 36px;
    border-radius: 50%;
    background: linear-gradient(135deg, rgba(201,168,76,0.2), rgba(232,132,42,0.1));
    border: 1px solid rgba(201,168,76,0.3);
    display: flex; align-items: center; justify-content: center;
    font-size: 1rem;
    flex-shrink: 0;
  }

  .feat-label {
    font-size: 0.82rem;
    font-weight: 500;
    color: var(--text);
    line-height: 1.4;
  }

  .feat-label small {
    display: block;
    color: var(--muted);
    font-weight: 300;
    font-size: 0.74rem;
    margin-top: 0.2rem;
  }

  .about-image-wrap {
    position: relative;
  }

  .about-image-wrap img {
    width: 100%;
    height: 480px;
    object-fit: cover;
    border-radius: 4px;
    filter: brightness(0.8) saturate(1.2);
  }

  .about-image-wrap::after {
    content: '';
    position: absolute;
    inset: 0;
    background: linear-gradient(to top right, rgba(201,168,76,0.15), transparent);
    border-radius: 4px;
    pointer-events: none;
  }

  .about-badge {
    position: absolute;
    bottom: 1.5rem; right: -1rem;
    background: linear-gradient(135deg, var(--gold), var(--saffron));
    color: var(--bg);
    padding: 1rem 1.5rem;
    border-radius: 4px;
    font-family: 'Cormorant Garamond', serif;
    text-align: center;
    box-shadow: 0 8px 30px rgba(0,0,0,0.5), 0 0 20px var(--glow);
  }

  .about-badge strong { display: block; font-size: 1.8rem; font-weight: 700; line-height: 1; }
  .about-badge span { font-size: 0.72rem; letter-spacing: 0.1em; text-transform: uppercase; opacity: 0.85; }

  /* ─── SPECIALS ─── */
  #specials { background: var(--bg3); }

  .specials-grid {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 1.5rem;
    margin-top: 3rem;
  }

  .special-card {
    padding: 2rem 1.8rem;
    text-align: center;
  }

  .special-icon {
    font-size: 2.8rem;
    margin-bottom: 1rem;
    display: block;
    filter: drop-shadow(0 0 12px var(--glow));
  }

  .special-card h3 {
    font-family: 'Cormorant Garamond', serif;
    font-size: 1.4rem;
    font-weight: 600;
    color: var(--gold);
    margin-bottom: 0.6rem;
  }

  .special-card p {
    color: var(--muted);
    font-size: 0.86rem;
    line-height: 1.7;
    font-weight: 300;
  }

  /* ─── MENU ─── */
  #menu { background: var(--bg); }

  .menu-grid {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 1.8rem;
    margin-top: 3rem;
  }

  .menu-card { overflow: hidden; }

  .menu-card-img {
    width: 100%; height: 220px;
    object-fit: cover;
    transition: transform 0.5s ease, filter 0.5s ease;
    filter: brightness(0.85) saturate(1.2);
  }

  .menu-card:hover .menu-card-img {
    transform: scale(1.06);
    filter: brightness(0.95) saturate(1.4);
  }

  .menu-img-wrap {
    overflow: hidden;
    position: relative;
  }

  .menu-img-wrap::after {
    content: '';
    position: absolute;
    bottom: 0; left: 0; right: 0;
    height: 80px;
    background: linear-gradient(to top, var(--bg), transparent);
    pointer-events: none;
  }

  .menu-body { padding: 1.5rem 1.8rem 1.8rem; }

  .menu-tag {
    font-size: 0.65rem;
    letter-spacing: 0.2em;
    text-transform: uppercase;
    color: var(--saffron);
    font-weight: 500;
    margin-bottom: 0.5rem;
  }

  .menu-body h3 {
    font-family: 'Cormorant Garamond', serif;
    font-size: 1.6rem;
    font-weight: 700;
    color: var(--text);
    margin-bottom: 0.5rem;
  }

  .menu-body p {
    color: var(--muted);
    font-size: 0.83rem;
    line-height: 1.65;
    font-weight: 300;
    margin-bottom: 1.3rem;
  }

  .menu-footer {
    display: flex;
    align-items: center;
    justify-content: space-between;
  }

  .menu-price {
    font-family: 'Cormorant Garamond', serif;
    font-size: 1.5rem;
    font-weight: 700;
    color: var(--gold);
  }

  .menu-price span {
    font-size: 0.75rem;
    color: var(--muted);
    font-family: 'DM Sans', sans-serif;
    font-weight: 300;
    letter-spacing: 0.08em;
  }

  .btn-sm {
    padding: 0.5rem 1.2rem;
    background: transparent;
    color: var(--gold);
    border: 1px solid rgba(201,168,76,0.4);
    border-radius: 2px;
    font-size: 0.72rem;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    cursor: pointer;
    font-family: 'DM Sans', sans-serif;
    font-weight: 500;
    transition: all 0.3s;
  }

  .btn-sm:hover {
    background: linear-gradient(135deg, var(--gold), var(--saffron));
    color: var(--bg);
    border-color: transparent;
    box-shadow: 0 0 18px var(--glow);
  }

  /* ─── WHY US ─── */
  #why { background: var(--bg2); }

  .why-grid {
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    gap: 1.2rem;
    margin-top: 3rem;
  }

  .why-card {
    padding: 2rem 1.5rem;
    text-align: center;
  }

  .why-num {
    font-family: 'Cormorant Garamond', serif;
    font-size: 3rem;
    font-weight: 700;
    line-height: 1;
    background: linear-gradient(135deg, var(--gold), var(--saffron));
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
    margin-bottom: 0.6rem;
    display: block;
  }

  .why-card h4 {
    font-family: 'Cormorant Garamond', serif;
    font-size: 1.1rem;
    font-weight: 600;
    color: var(--text);
    margin-bottom: 0.5rem;
  }

  .why-card p {
    color: var(--muted);
    font-size: 0.8rem;
    line-height: 1.65;
    font-weight: 300;
  }

  /* ─── TESTIMONIALS ─── */
  #testimonials { background: var(--bg3); }

  .testi-grid {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 1.5rem;
    margin-top: 3rem;
  }

  .testi-card { padding: 2rem; }

  .stars { color: var(--gold); font-size: 0.9rem; letter-spacing: 0.1em; margin-bottom: 1rem; }

  .testi-card blockquote {
    font-family: 'Cormorant Garamond', serif;
    font-size: 1.1rem;
    font-style: italic;
    color: var(--text);
    line-height: 1.65;
    margin-bottom: 1.3rem;
    opacity: 0.9;
  }

  .testi-author {
    display: flex;
    align-items: center;
    gap: 0.8rem;
  }

  .testi-avatar {
    width: 38px; height: 38px;
    border-radius: 50%;
    background: linear-gradient(135deg, var(--gold), var(--saffron));
    display: flex; align-items: center; justify-content: center;
    font-family: 'Cormorant Garamond', serif;
    font-size: 1rem;
    font-weight: 700;
    color: var(--bg);
    flex-shrink: 0;
  }

  .testi-name { font-size: 0.82rem; font-weight: 500; color: var(--text); }
  .testi-loc { font-size: 0.72rem; color: var(--muted); font-weight: 300; }

  /* ─── DIVIDER ─── */
  .divider {
    width: 100%;
    height: 1px;
    background: linear-gradient(to right, transparent, var(--glass-border), transparent);
    margin: 0 auto;
  }

  /* ─── CONTACT ─── */
  #contact { background: var(--bg); }

  .contact-wrap {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 4rem;
    align-items: start;
  }

  .contact-info p {
    color: var(--muted);
    font-size: 0.92rem;
    line-height: 1.8;
    font-weight: 300;
    margin-bottom: 2rem;
  }

  .contact-items { display: flex; flex-direction: column; gap: 1rem; }

  .contact-item {
    display: flex;
    align-items: center;
    gap: 1rem;
    padding: 1rem 1.3rem;
  }

  .contact-item-icon {
    width: 40px; height: 40px;
    border-radius: 50%;
    background: linear-gradient(135deg, rgba(201,168,76,0.15), rgba(232,132,42,0.08));
    border: 1px solid rgba(201,168,76,0.25);
    display: flex; align-items: center; justify-content: center;
    font-size: 1.1rem;
    flex-shrink: 0;
  }

  .contact-item-text strong { display: block; font-size: 0.78rem; color: var(--gold); font-weight: 500; letter-spacing: 0.08em; text-transform: uppercase; }
  .contact-item-text span { font-size: 0.9rem; color: var(--text); font-weight: 300; }

  .wa-btn {
    display: inline-flex;
    align-items: center;
    gap: 0.6rem;
    margin-top: 1.5rem;
    padding: 0.85rem 1.8rem;
    background: linear-gradient(135deg, #25D366, #1aad55);
    color: #fff;
    border: none;
    border-radius: 2px;
    font-family: 'DM Sans', sans-serif;
    font-size: 0.82rem;
    font-weight: 500;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    cursor: pointer;
    text-decoration: none;
    transition: box-shadow 0.3s, transform 0.2s;
  }

  .wa-btn:hover {
    box-shadow: 0 0 24px rgba(37,211,102,0.35);
    transform: translateY(-2px);
  }

  .contact-form { display: flex; flex-direction: column; gap: 1rem; }

  .form-row { display: grid; grid-template-columns: 1fr 1fr; gap: 1rem; }

  .form-group { display: flex; flex-direction: column; gap: 0.4rem; }

  .form-group label {
    font-size: 0.72rem;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    color: var(--muted);
    font-weight: 500;
  }

  .form-group input,
  .form-group select,
  .form-group textarea {
    background: rgba(201,168,76,0.04);
    border: 1px solid var(--glass-border);
    border-radius: 2px;
    padding: 0.75rem 1rem;
    color: var(--text);
    font-family: 'DM Sans', sans-serif;
    font-size: 0.88rem;
    font-weight: 300;
    outline: none;
    transition: border-color 0.3s, box-shadow 0.3s;
    backdrop-filter: blur(8px);
  }

  .form-group input::placeholder,
  .form-group textarea::placeholder { color: rgba(154,138,104,0.5); }

  .form-group input:focus,
  .form-group select:focus,
  .form-group textarea:focus {
    border-color: rgba(201,168,76,0.5);
    box-shadow: 0 0 14px rgba(201,168,76,0.1);
  }

  .form-group select option { background: var(--bg2); }

  .form-group textarea { resize: vertical; min-height: 100px; }

  /* ─── FOOTER ─── */
  footer {
    background: #060504;
    border-top: 1px solid var(--glass-border);
    padding: 3rem 2rem;
    text-align: center;
  }

  .footer-logo {
    font-family: 'Cormorant Garamond', serif;
    font-size: 2rem;
    font-weight: 700;
    color: var(--gold);
    margin-bottom: 0.5rem;
  }

  .footer-logo span { color: var(--saffron); }

  .footer-tagline {
    color: var(--muted);
    font-size: 0.8rem;
    letter-spacing: 0.2em;
    text-transform: uppercase;
    font-weight: 300;
    margin-bottom: 2rem;
  }

  .footer-links {
    display: flex;
    justify-content: center;
    gap: 2rem;
    margin-bottom: 2rem;
    flex-wrap: wrap;
